name: Social Poster

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "投稿先プラットフォーム"
        required: true
        type: choice
        options:
          - twitter
          - note
          - all
      type:
        description: "コンテンツタイプ"
        required: false
        type: string
        default: ""
      tone:
        description: "トーン (例: casual, professional, friendly)"
        required: false
        type: string
        default: ""
      topic:
        description: "トピック"
        required: false
        type: string
        default: ""
      dry_run:
        description: "ドライラン（実際に投稿しない）"
        required: true
        type: boolean
        default: true

jobs:
  post:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/social-poster
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build CLI arguments
        id: args
        run: |
          ARGS="--platform ${{ inputs.platform }}"
          if [ -n "${{ inputs.type }}" ]; then
            ARGS="$ARGS --type ${{ inputs.type }}"
          fi
          if [ -n "${{ inputs.tone }}" ]; then
            ARGS="$ARGS --tone ${{ inputs.tone }}"
          fi
          if [ -n "${{ inputs.topic }}" ]; then
            ARGS="$ARGS --topic ${{ inputs.topic }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "cli_args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Run Social Poster
        run: npx tsx src/cli.ts ${{ steps.args.outputs.cli_args }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          NOTE_API_TOKEN: ${{ secrets.NOTE_API_TOKEN }}
